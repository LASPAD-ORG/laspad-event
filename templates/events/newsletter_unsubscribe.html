{% extends 'base/base.html' %}
{% block title %}Désabonnement — LASPAD Event{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center">
  <div class="w-16 h-16 rounded-full mx-auto mb-5 flex items-center justify-center bg-green-50">
    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <h1 class="text-xl font-bold text-gray-800 mb-2">Désabonnement effectué</h1>
  <p class="text-gray-500 text-sm">
    {{ participant.first_name }}, vous ne recevrez plus les annonces d'événements LASPAD.
  </p>
  <a href="{% url 'events:list' %}" class="inline-block mt-6 text-green-700 hover:underline text-sm">
    Retour aux événements →
  </a>
</div>
{% endblock %}
